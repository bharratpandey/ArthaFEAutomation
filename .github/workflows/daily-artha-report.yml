name: Daily Artha Automation Report

on:
  schedule:
    # Every weekday (Mon–Fri) at 12:00 PM IST = 6:30 AM UTC
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install Playwright Chromium
        run: |
          mvn dependency:resolve --no-transfer-progress
          PLAYWRIGHT_JAR=$(find ~/.m2/repository/com/microsoft/playwright/playwright -name "playwright-*.jar" | head -1)
          DRIVER_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver -name "driver-*.jar" | head -1)
          BUNDLE_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver-bundle -name "driver-bundle-*.jar" | head -1)
          java -cp "$PLAYWRIGHT_JAR:$DRIVER_JAR:$BUNDLE_JAR" com.microsoft.playwright.CLI install chromium

      - name: Run E2E Tests
        run: xvfb-run mvn test -Dtest=DealTest
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Artha-Automation-Dashboard
          path: target/AutomationDashboard.html