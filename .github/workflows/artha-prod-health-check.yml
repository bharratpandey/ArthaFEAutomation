name: Artha Prod Health Check

# ─────────────────────────────────────────────────────────────────────────────
# Schedule:
#   5:00 AM IST  = 23:30 UTC (previous day)  ← night run
#   5:00 PM IST  = 11:30 UTC                  ← afternoon run
#
# Both run Monday–Friday only.
# workflow_dispatch lets you trigger it manually from the GitHub Actions UI.
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '30 23 * * 0-4'   # 5:00 AM IST  (Sun–Thu UTC = Mon–Fri IST)
    - cron: '30 11 * * 1-5'   # 5:00 PM IST  (Mon–Fri UTC)
  workflow_dispatch:
    inputs:
      email_to:
        description: 'Override recipient list (comma-separated)'
        required: false
        default: ''
      headless:
        description: 'Run browser headless'
        required: false
        default: 'true'

jobs:
  prod-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. System deps for Chromium (headless Linux) ──────────────────────
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 xvfb

      # ── 4. Cache Playwright browsers (keyed on pom.xml) ───────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ hashFiles('pom.xml') }}
          restore-keys: |
            playwright-browsers-

      # ── 5. Resolve Maven deps + install Chromium ──────────────────────────
      - name: Resolve Maven dependencies
        run: mvn dependency:resolve --no-transfer-progress -q

      - name: Install Playwright Chromium
        run: |
          PLAYWRIGHT_JAR=$(find ~/.m2/repository/com/microsoft/playwright/playwright \
            -name "playwright-*.jar" | head -1)
          DRIVER_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver \
            -name "driver-*.jar" | head -1)
          BUNDLE_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver-bundle \
            -name "driver-bundle-*.jar" | head -1)
          java -cp "$PLAYWRIGHT_JAR:$DRIVER_JAR:$BUNDLE_JAR" \
            com.microsoft.playwright.CLI install chromium

      - name: Install Chromium system deps via Playwright CLI
        run: |
          PLAYWRIGHT_JAR=$(find ~/.m2/repository/com/microsoft/playwright/playwright \
            -name "playwright-*.jar" | head -1)
          DRIVER_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver \
            -name "driver-*.jar" | head -1)
          BUNDLE_JAR=$(find ~/.m2/repository/com/microsoft/playwright/driver-bundle \
            -name "driver-bundle-*.jar" | head -1)
          sudo java -cp "$PLAYWRIGHT_JAR:$DRIVER_JAR:$BUNDLE_JAR" \
            com.microsoft.playwright.CLI install-deps chromium

      # ── 6. Determine email recipient ──────────────────────────────────────
      # Manual dispatch can override; scheduled runs use the hardcoded default.
      - name: Set email recipient
        id: email
        run: |
          if [ -n "${{ github.event.inputs.email_to }}" ]; then
            echo "to=${{ github.event.inputs.email_to }}" >> $GITHUB_OUTPUT
          else
            echo "to=bharat.pandey@emb.global,saumya.gupta@emb.global,ashish.mishra@emb.global" >> $GITHUB_OUTPUT
          fi

      # ── 7. Run the health check ────────────────────────────────────────────
      - name: Run Artha Prod Health Check
        run: |
          xvfb-run mvn test \
            -Dtest=ProdHealthCheckTest \
            -Dheadless=${{ github.event.inputs.headless || 'true' }} \
            -Demail.to="${{ steps.email.outputs.to }}" \
            --no-transfer-progress
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          CI: true

      # ── 8. Upload artifacts (always — even on failure) ────────────────────
      - name: Upload HTML Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Artha-Prod-Health-Dashboard-${{ github.run_number }}
          path: target/AutomationDashboard.html
          retention-days: 30

      - name: Upload Playwright Trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Artha-Prod-Health-Trace-${{ github.run_number }}
          path: target/artha-prod-health-trace.zip
          retention-days: 14

      # ── 9. Print run summary in GitHub Actions UI ─────────────────────────
      - name: Print run summary
        if: always()
        run: |
          echo "## Artha Prod Health Check — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Production — artha.emb.global |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Recipients | ${{ steps.email.outputs.to }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trace viewer | https://trace.playwright.dev/ |" >> $GITHUB_STEP_SUMMARY